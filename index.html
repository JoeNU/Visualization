<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visualization Demos</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #06171b;
        color: #eefafa;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 50% 20%, rgba(44, 242, 220, 0.15), transparent 34rem),
          linear-gradient(180deg, #06171b 0%, #041014 100%);
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        color: #a9cfd0;
        font-size: 1rem;
      }

      video {
        display: block;
        width: 100%;
        border: 1px solid rgba(117, 255, 242, 0.25);
        border-radius: 8px;
        background: #02090c;
      }

      a {
        color: #58f2df;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Visualization Demos</h1>
      <p>Code-generated visualization experiments and generative video tools.</p>

      <h2>Neural Distillation Video</h2>
      <video controls preload="metadata" poster="projects/neural-distillation-video/media/contact_sheet_slow.jpg">
        <source src="projects/neural-distillation-video/media/distillation_style.mp4" type="video/mp4">
        <a href="projects/neural-distillation-video/media/distillation_style.mp4">Play the MP4</a>
      </video>
    </main>
  </body>
</html>
